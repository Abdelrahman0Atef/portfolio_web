name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.0'
          cache: true

      - name: Verify install
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      # If you're publishing to https://<user>.github.io/<repo>/ you MUST
      # pass --base-href "/<repo>/" so all assets resolve correctly.
      # Edit the value below to match your repo name, or remove the flag
      # if you're using a custom domain or a user-page (<user>.github.io).
      - name: Build web
        run: flutter build web --release --base-href "/portfolio_web/"

      - name: Add 404.html (SPA fallback)
        run: cp build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
